public_paths:
  # Only paths listed here are publicly accessible.
  # Default: all paths are private.
  #
  # Avoid exposing the root path (/), as it may implicitly expose
  # dependent assets (CSS, images, fonts).
  - /foo
  - /bar

  # common public files
  - /favicon.ico
  - /robots.txt
  - /humans.txt
  - /site.webmanifest

  # well-known endpoints
  - /.well-known/appspecific/com.chrome.devtools.json

registration:
  policy: enabled # enabled | disabled | domain_allowlist | invite_only
  allowed_domains:
    - company.com

session:
  max_age_days: 30

flows:

  # I have a password
  password:
    allow_username: true
    allow_email: true
    min_password_length: 8

  # Send me a link to my email
  magic_link:
    mode: link_and_code # link | code | link_and_code

  # Sign in with Google
  google:
    client_id: ${AUTHWALL_GOOGLE_CLIENT_ID}
    client_secret: ${AUTHWALL_GOOGLE_CLIENT_SECRET}
    redirect_url: ${AUTHWALL_GOOGLE_REDIRECT_URL}

seed_users:

  - username: foo
    display_name: Foo
    password_hash: $2b$12$HjdTGILq./Cak9R9pTQqxODQSkmuS.vnOWVpQxo14R0tSQiqGBE0G

