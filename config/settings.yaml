public_url: ${AUTHWALL_PUBLIC_URL}

public_paths:
  # Only paths listed here are publicly accessible.
  # Entries ending in /* are treated as prefixes, e.g. /lib/* matches /lib/app.js.
  # Can be overridden with AUTHWALL_PUBLIC_PATHS=/favicon.ico,/lib/*,/designs/*
  # Default: all paths are private.
  #
  # Avoid exposing the root path (/), as it may implicitly expose
  # dependent assets (CSS, images, fonts).
  # - /foo
  # - /bar
  # - /lib/*
  # - /designs/*

  # common public files
  - /favicon.ico
  - /robots.txt
  - /humans.txt
  - /site.webmanifest

  # well-known endpoints
  - /.well-known/appspecific/com.chrome.devtools.json

optional_auth_paths:
  # Paths listed here are accessible without sign-in, but signed-in users
  # are proxied with X-Auth-User like private paths.
  # Entries ending in /* are treated as prefixes.
  # Can be overridden with AUTHWALL_OPTIONAL_AUTH_PATHS=/,/landing/*
  # - /
  # - /landing/*

upstream:
  url: ${AUTHWALL_UPSTREAM_URL}
  mode: ${AUTHWALL_UPSTREAM_MODE}
  set_headers: ${AUTHWALL_SET_HEADERS}
  unset_headers: ${AUTHWALL_UNSET_HEADERS}

access:
  # (1) denied_emails -> deny
  # (2) allowed_emails -> allow
  # (3) denied_domains -> deny
  # (4) allowed_domains -> allow
  # - Empty fields are ignored
  # - If neither allowed_emails nor allowed_domains is set, the default action is allow
  # - If either is set, the default action is deny
  allowed_emails: ${AUTHWALL_ALLOWED_EMAILS}
  denied_emails: ${AUTHWALL_DENIED_EMAILS}
  denied_domains: ${AUTHWALL_DENIED_DOMAINS}
  allowed_domains: ${AUTHWALL_ALLOWED_DOMAINS}

bcrypt_rounds: ${AUTHWALL_BCRYPT_ROUNDS}

confirm_email:
  required: ${AUTHWALL_CONFIRM_EMAIL_REQUIRED}
  mode: ${AUTHWALL_CONFIRM_EMAIL} # auto | off | disabled | link | code | link_and_code
  expires_minutes: 15
  code_length: 6
  max_attempts: 5
  resend_cooldown_seconds: 60

sentry:
  dsn: ${AUTHWALL_SENTRY_DSN}
  environment: ${AUTHWALL_SENTRY_ENVIRONMENT}
  traces_sample_rate: ${AUTHWALL_SENTRY_TRACES_SAMPLE_RATE}

personal_access_tokens:
  enabled: ${AUTHWALL_PERSONAL_ACCESS_TOKENS}

cookie:
  domain: ${AUTHWALL_COOKIE_DOMAIN}
  path: ${AUTHWALL_COOKIE_PATH}
  secure: ${AUTHWALL_COOKIE_SECURE}
  same_site: ${AUTHWALL_COOKIE_SAMESITE}
  max_age_days: 30

# AUTHWALL_FLOWS=auto
# or comma-separated: username,email,magic_link,magic_code,magic_link_and_code,google,github,microsoft,facebook,twitter,discord
flows:

  # I have a password
  password:
    enabled: true
    allow_username: true
    allow_email: true
    min_password_length: ${AUTHWALL_PASSWORD_MIN}

  # Send me a link to my email
  magic_link:
    enabled: true
    mode: ${AUTHWALL_MAGIC_LINK} # auto | off | disabled | link | code | link_and_code

  # Sign in with Google
  google:
    enabled: true
    client_id: ${AUTHWALL_GOOGLE_CLIENT_ID}
    client_secret: ${AUTHWALL_GOOGLE_CLIENT_SECRET}
    redirect_url: ${AUTHWALL_GOOGLE_REDIRECT_URL}

  # Sign in with GitHub
  github:
    enabled: true
    client_id: ${AUTHWALL_GITHUB_CLIENT_ID}
    client_secret: ${AUTHWALL_GITHUB_CLIENT_SECRET}
    redirect_url: ${AUTHWALL_GITHUB_REDIRECT_URL}

  # Sign in with Microsoft
  microsoft:
    enabled: true
    client_id: ${AUTHWALL_MICROSOFT_CLIENT_ID}
    client_secret: ${AUTHWALL_MICROSOFT_CLIENT_SECRET}
    redirect_url: ${AUTHWALL_MICROSOFT_REDIRECT_URL}

  # Sign in with Facebook
  facebook:
    enabled: true
    client_id: ${AUTHWALL_FACEBOOK_CLIENT_ID}
    client_secret: ${AUTHWALL_FACEBOOK_CLIENT_SECRET}
    redirect_url: ${AUTHWALL_FACEBOOK_REDIRECT_URL}

  # Sign in with X
  twitter:
    enabled: true
    client_id: ${AUTHWALL_TWITTER_CLIENT_ID}
    client_secret: ${AUTHWALL_TWITTER_CLIENT_SECRET}
    redirect_url: ${AUTHWALL_TWITTER_REDIRECT_URL}

  # Sign in with Discord
  discord:
    enabled: true
    client_id: ${AUTHWALL_DISCORD_CLIENT_ID}
    client_secret: ${AUTHWALL_DISCORD_CLIENT_SECRET}
    redirect_url: ${AUTHWALL_DISCORD_REDIRECT_URL}

mailer:
  enabled: true
  provider: ${AUTHWALL_MAILER}

  resend:
    key: ${AUTHWALL_RESEND_KEY}
    from: ${AUTHWALL_RESEND_FROM}

  mailjet:
    key: ${AUTHWALL_MAILJET_KEY}
    secret: ${AUTHWALL_MAILJET_SECRET}
    from: ${AUTHWALL_MAILJET_FROM}

  ses:
    region: ${AUTHWALL_SES_REGION}
    key: ${AUTHWALL_SES_KEY}
    secret: ${AUTHWALL_SES_SECRET}
    session_token: ${AUTHWALL_SES_SESSION_TOKEN}
    from: ${AUTHWALL_SES_FROM}

