name: Production Release

on:
  push:
    branches: [ production ]

jobs:
  test-sqlite:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # Run inside the official Playwright image: the browsers are prebaked, so
    # there is no flaky `playwright install` download at run time. Keep this tag
    # in sync with the @playwright/test version in package.json.
    container: mcr.microsoft.com/playwright:v1.59.1-noble
    services:
      echo:
        image: jmalloc/echo-server
        ports:
          - 8080:8080
    steps:
      - uses: actions/checkout@v4
        with:
          ref: production
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        env:
          # Inside a container job, service containers are reached by label, not localhost.
          AUTHWALL_UPSTREAM_URL: http://echo:8080
        run: bin/test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-sqlite
          path: playwright-report/
          retention-days: 30

  test-mysql:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.59.1-noble
    strategy:
      matrix:
        mysql-version: [8, 5.7]
    services:
      echo:
        image: jmalloc/echo-server
        ports:
          - 8080:8080
      mysql:
        image: mysql:${{ matrix.mysql-version }}
        env:
          MYSQL_DATABASE: authwall
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4
        with:
          ref: production
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Verify MySQL version
        env:
          AUTHWALL_DB: mysql://root:root@mysql:3306/authwall
          EXPECTED_MYSQL_VERSION: ${{ matrix.mysql-version }}
        run: |
          node - <<'NODE'
          const mysql = require('mysql2/promise');

          (async () => {
            const connection = await mysql.createConnection(process.env.AUTHWALL_DB);
            const [[row]] = await connection.query('SELECT VERSION() AS version');
            await connection.end();

            const expected = process.env.EXPECTED_MYSQL_VERSION + '.';
            if (!String(row.version).startsWith(expected)) {
              throw new Error(`Expected MySQL ${expected}x, got ${row.version}`);
            }
            console.log(`MySQL ${row.version}`);
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE
      - name: Run tests
        env:
          AUTHWALL_DB: mysql://root:root@mysql:3306/authwall
          AUTHWALL_UPSTREAM_URL: http://echo:8080
        run: bin/test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-mysql-${{ matrix.mysql-version }}
          path: playwright-report/
          retention-days: 30

  test-postgres:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.59.1-noble
    services:
      echo:
        image: jmalloc/echo-server
        ports:
          - 8080:8080
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: authwall
          POSTGRES_USER: authwall
          POSTGRES_PASSWORD: authwall
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U authwall -d authwall"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4
        with:
          ref: production
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        env:
          AUTHWALL_DB: postgres://authwall:authwall@postgres:5432/authwall
          AUTHWALL_UPSTREAM_URL: http://echo:8080
        run: bin/test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-postgres
          path: playwright-report/
          retention-days: 30

  deploy:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: [test-sqlite, test-mysql, test-postgres]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: production
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Deploy Docker image
        run: bin/deploy
