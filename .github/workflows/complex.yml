name: Complex Tests
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      matrix:
        db: [sqlite, mysql]
    services:
      echo:
        image: jmalloc/echo-server
        ports:
          - 8080:8080
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: authwall
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
#    - name: Run Playwright tests
#      run: npx playwright test
    - name: Run all tests
      env:
        AUTHWALL_MYSQL: ${{ matrix.db == 'mysql' && 'mysql://root:root@127.0.0.1:3306/authwall' || '' }}
      run: npm test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-${{ matrix.db }}
        path: playwright-report/
        retention-days: 30
