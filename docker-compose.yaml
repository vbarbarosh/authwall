services:

  authwall:
    image: vbarbarosh/authwall
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AUTHWALL_PUBLIC_URL: http://localhost:3000
      AUTHWALL_TARGET_URL: http://echo-server:8080
      AUTHWALL_SECRET: hello
      AUTHWALL_MYSQL: mysql://authwall:authwall@mysql/authwall
    ports:
      - '3000:3000'
    volumes:
      - ./data/authwall:/app/data
    depends_on:
      - mysql

  mysql:
    image: mysql:8.4.8
    environment:
      MYSQL_DATABASE: authwall
      MYSQL_USER: authwall
      MYSQL_PASSWORD: authwall
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./data/mysql:/var/lib/mysql

  echo-server:
      image: jmalloc/echo-server
      restart: unless-stopped
