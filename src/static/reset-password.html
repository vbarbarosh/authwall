<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Reset password | authwall</title>
    <link href="/auth/static/authwall.css" rel="stylesheet">
</head>
<body>

<div id="error"></div>

<form action="/auth/reset-password" method="POST">
    <label>
        Username
        <input type="text" name="username" autocomplete="username" required readonly>
    </label>
    <label>
        Current password
        <input type="password" name="current_password" autocomplete="current-password" required>
    </label>
    <label>
        Password
        <input type="password" name="password" autocomplete="new-password" required>
    </label>
    <label>
        Confirm Password
        <input type="password" name="password_confirm" autocomplete="new-password" required>
    </label>
    <input type="submit" value="Change password">
</form>

<p><a href="/auth/sign-out">Sign out</a></p>

<script type="module">
    const response = await fetch('/auth/status');
    const status = await response.json();
    console.log(status);
    document.querySelector('#error').innerText = status.error;
    document.querySelector('input[name=username]').value = status.username;
</script>

</body>
</html>
