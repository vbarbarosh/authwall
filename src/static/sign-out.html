<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Sign out | authwall</title>
    <link href="/auth/static/authwall.css" rel="stylesheet">
</head>
<body>

<div id="error"></div>

<p>You are about to sign out.</p>

<form action="/auth/sign-out" method="POST">
    <input type="submit" value="Sign out">
</form>

<p><a href="/">Cancel</a></p>

<script type="module">
    const response = await fetch('/auth/status');
    const status = await response.json();
    console.log(status);
    document.querySelector('#error').innerText = status.error;
</script>

</body>
</html>
