<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Forgot password | authwall</title>
    <link href="/auth/static/authwall.css" rel="stylesheet">
</head>
<body>

<div id="error"></div>

<form action="/auth/forgot-password" method="POST">
    <label>
        Email
        <input type="email" name="email" autocomplete="email" required>
    </label>
    <input type="submit" value="Send reset link">
</form>

<p><a href="/auth/sign-up">Sign up</a></p>
<p><a href="/auth/sign-in">Sign in</a></p>
<p><a href="/auth/google">Sign in with Google</a></p>

<script type="module">
    const response = await fetch('/auth/status');
    const status = await response.json();
    console.log(status);
    document.querySelector('#error').innerText = status.error;
</script>

</body>
</html>
