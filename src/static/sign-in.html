<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in | authwall</title>
    <link href="/auth/static/authwall.css" rel="stylesheet">
</head>
<body>

<header>
    <h1>Sign in</h1>
</header>

<main>
    <p id="error" role="alert" aria-live="polite"></p>

    <form action="/auth/sign-in" method="POST" autocomplete="on">
        <input type="hidden" name="_csrf">
        <label>
            Username
            <input type="text" name="username" autocomplete="username" required>
        </label>
        <label>
            Password
            <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button type="submit">Sign in</button>
    </form>
</main>

<footer>
    <nav aria-label="Authentication options">
        <ul>
            <li><a href="/auth/sign-up">Sign up</a></li>
            <li><a href="/auth/google">Sign in with Google</a></li>
            <li><a href="/auth/forgot-password">Forgot password</a></li>
            <li><a href="/auth/magic-link">Sign in with magic link</a></li>
        </ul>
    </nav>
    <nav aria-label="Development">
        <ul>
            <li><a href="/auth/change-password">Change password</a></li>
            <li><a href="/auth/forgot-password">Forgot password</a></li>
            <li><a href="/auth/google">Sign in with Google</a></li>
            <li><a href="/auth/magic-link">Sign in with magic link</a></li>
            <li><a href="/auth/magic-link-sent">Magic link sent</a></li>
            <li><a href="/auth/profile">Profile</a></li>
            <li><a href="/auth/reset-password">Reset password</a></li>
            <li><a href="/auth/sessions">Sessions</a></li>
            <li><a href="/auth/sign-in">Sign in</a></li>
            <li><a href="/auth/sign-out">Sign out</a></li>
            <li><a href="/auth/sign-up">Sign up</a></li>
            <li><a href="/auth/status">Status</a></li>
        </ul>
    </nav>
</footer>

<script type="module">
    const status = await fetch('/auth/status').then(v => v.json());
    document.querySelector('#error').textContent = status.error;
    document.querySelector('input[name=_csrf]').value = status.csrf_token; // (document.cookie.match(/(?:^|; )csrf_token=([^;]*)/)?.[1] ?? '');
</script>

</body>
</html>
