<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Sign up | authwall</title>
    <link href="/auth/static/authwall.css" rel="stylesheet">
</head>
<body>

<div id="error"></div>

<form action="/auth/sign-up" method="POST">
    <label>
        Username
        <input type="text" name="username" autocomplete="username" required>
    </label>
    <label>
        Password
        <input type="password" name="password" autocomplete="new-password" required>
    </label>
    <label>
        Confirm password
        <input type="password" name="password_confirm" autocomplete="new-password" required>
    </label>
    <input type="submit" value="Sign up">
</form>

<p><a href="/auth/sign-in">Sign in</a></p>
<p><a href="/auth/google">Sign in with Google</a></p>
<p><a href="/auth/forgot-password">Forgot password</a></p>
<p><a href="/auth/magic-link">Sign in with the magic link</a></p>

<script type="module">
    const response = await fetch('/auth/status');
    const status = await response.json();
    console.log(status);
    document.querySelector('#error').innerText = status.error;
</script>

</body>
</html>
