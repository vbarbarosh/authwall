<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Magic link sent | authwall</title>
    <link href="/auth/static/authwall.css" rel="stylesheet">
</head>
<body>

<div id="error"></div>

<p>Check your email for a login link or enter the code below.</p>

<form action="/auth/magic-link-sent" method="POST">
    <label>
        Email
        <input type="email" name="email" autocomplete="email" required readonly>
    </label>
    <label>
        Code
        <input type="text" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" required>
    </label>
    <input type="submit" value="Submit code">
</form>

<p><a href="/auth/sign-up">Sign up</a></p>
<p><a href="/auth/sign-in">Sign in</a></p>
<p><a href="/auth/google">Sign in with Google</a></p>

<script type="module">
    const response = await fetch('/auth/status');
    const status = await response.json();
    console.log(status);
    document.querySelector('#error').innerText = status.error;
    document.querySelector('[name=email]').value = (new URLSearchParams(location.search).get('email') || '');
</script>

</body>
</html>
